<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Chatbot
    </title>
    
    <link rel="stylesheet" href="chatbotStyle.css">
</head>

<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@3.2.1/external-library.js"></script>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function ChatInput({ chatMessages, setChatMessages }) {
            const [inputText, setInputText] = React.useState('');
            function saveInput(event) {
                setInputText(event.target.value)

            }

            function sendMessage() {
                const newChatMessages=[
                    ...chatMessages,
                    {
                        message: inputText,
                        sender: 'user',
                        id: crypto.randomUUID()
                    }
                ]

                setChatMessages([
                    ...chatMessages,
                    {
                        message: inputText,
                        sender: 'user',
                        id: crypto.randomUUID()
                    }
                ]);

                const response = Chatbot.getResponse(inputText)
                setChatMessages([
                    ...newChatMessages,
                    {
                        message: response,
                        sender:'robot',
                        id: crypto.randomUUID()
                    }
                ]);

                setInputText('')
            }
            return (
                <div className="input-chat-container">
                    <input className="chat-input" placeholder="Send a message to Chatbot"
                        size="30" onChange={saveInput} type="text"
                        value={inputText}
                    />
                    <button onClick={sendMessage} className="send-button">Send</button>
                </div>
            );
        }

        function ChatMessage({ message, sender }) {   //destructuring shortcut
            // const message=props.message
            // const sender=props.sender  

            /* if (sender=='robot'){
                 return (
                 <div>
                  <img src="robot.avif" width="50" alt="Robot's icon"/> 
                 {message}       
                 </div>
                 );
             }*/
            return (
                <div className={sender==='user'? 'chat-message-user':'chat-message-robot'}>
                    {sender == 'robot' && <img src="robot.avif" width="50" alt="Robot's icon" />}
                   <div className="chat-message"> {message}</div>
                    {sender == 'user' && <img src="user.jpg" width="50" alt="user's icon" />}
                </div>
            );
        }

        function ChatMessages({ chatMessages }) {
            const chatMessagesRef=React.useRef(null);
            React.useEffect(()=>{
                const containerElem=chatMessagesRef.current;
                if (containerElem){
                    containerElem.scrollTop=containerElem.scrollHeight;
                }
            },[chatMessages]);
            return (
                <>

                    {chatMessages.map((chatMessage) => {
                        return (
                            <ChatMessage
                                message={chatMessage.message}
                                sender={chatMessage.sender}
                                key={chatMessage.id}

                            />
                        );
                    })}
                </>
            );

        }

        function App() {
            const [chatMessages, setChatMessages] = React.useState(
                []);
            // const chatMessages=array[0];
            // const setChatMessages=array[1];
            // const [chatMessages, setChatMessages]=array;
            return (
                <div className="app-container">
                    <ChatInput
                        chatMessages={chatMessages}
                        setChatMessages={setChatMessages}
                    />
                    <ChatMessages
                        chatMessages={chatMessages}
                    />
                </div>
            );
        }
        /*const app=(
           <>
           <ChatInput/>
           <ChatMessage message="hello" sender="user"/>
           <ChatMessage message="Hello, how can I help you? " sender="robot"/>
               </>
        );*/
        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App />);

    </script>

</body>

</html>
