<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Internet</title>
</head>
<!-- style -->
 <style>
.body-cls {
 display: flex;
 justify-content: center;
 align-items: center;
 min-height: 100svh;
  background-image: linear-gradient(
    to bottom right,
    #e9d5ff,  
    #c7d2fe,   
    #d8b4fe    
  );
  padding-left: 1rem;  /* px-4 */
  padding-right: 1rem; /* px-4 */
}
.main-container {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  width: clamp(280px, 90vw, 420px);
}
.router {
  position: relative;
  width: 13rem;   
  height: 4.5rem; 
  background: white;
  border-radius: 1.5rem; 
  box-shadow: 0 10px 15px rgba(0,0,0,0.2); 
  display: flex;
  align-items: center;
  justify-content: center;
}

.antenna {
  position: absolute;
  top: -4rem;   
  left: 6rem;   
  width: 0.5rem; 
  height: 4rem;  
  background: white;
  border-radius: 0.25rem;
}

.red-light {
  position: absolute;
  left: 1.5rem; 
  width: 1rem;  
  height: 1rem; 
  background: #ef4444; 
  border-radius: 50%;
}

.black-lights {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3.5rem; 
}

.black-dot {
  width: 0.75rem; 
  height: 0.75rem; 
  background: black;
  border-radius: 50%;
}

.sleepy-eyes {
  display: flex;
  gap: 2.5rem; 
}

.sleep {
  width: 2rem; 
  height: 1rem; 
  border-bottom: 4px solid #a5b4fc; 
  border-radius: 9999px; 
}

.router-shadow {
  position: absolute;
  bottom: -1.5rem; 
  width: 14rem;    
  height: 1.25rem;
  background: rgba(129, 140, 248, 0.3); 
  filter: blur(20px); 
  border-radius: 9999px;
}

.oops {
  color: white;
  font-weight: bold;
  font-size: clamp(38px, 6vw, 64px);
}

.no-internet {
  color: #312e81;
  font-weight: 600;
  font-size: clamp(18px, 2.5vw, 24px);
}

.retry-btn {
  padding: 0.75rem 1.5rem; 
  background: #4f46e5;
  color: white;
  border-radius: 0.75rem; 
  cursor: pointer;
}

.retry-btn:hover {
  background: #312e81; 
}

.status {
  font-weight: 600;
}

/* animation */
/* floating router */
@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-12px)}
}

/* blinking light */
@keyframes blink{
0%,100%{opacity:1}
50%{opacity:.2}
}

/* sleepy eyes */
@keyframes sleepy{
0%,100%{transform:scaleY(1)}
50%{transform:scaleY(.4)}
}

.router{animation:float 3s ease-in-out infinite;}
.blink{animation:blink 1.2s infinite;}
.sleep{animation:sleepy 4s ease-in-out infinite;}

 </style>

<body class="body-cls">
  <div class="main-container">
    <!-- router -->
    <div class="router">
      <!-- antena -->
      <div class="antenna"></div>

      <!-- red light -->
      <div class="red-light blink"></div>

      <!-- blac lights -->
      <div class="black-lights">
        <div class="black-dot"></div>
        <div class="black-dot"></div>
      </div>

      <!-- sleepy eye -->
      <div class="sleepy-eyes">
        <div class="sleep"></div>
        <div class="sleep"></div>
      </div>

      <!-- router shadow -->
      <div class="router-shadow"></div>
    </div>

    <!-- text -->
    <h1 class="oops">Ooops!</h1>
    <p class="no-internet">No internet connection.</p>

    <button onclick="retryConnection()" class="retry-btn">Retry</button>
    <p id="status" class="status"></p>
  </div>

<script>
function retryConnection(){

const status=document.getElementById("status")

if(navigator.onLine){
status.innerHTML="✅ Internet connected"
status.className="text-green-600 mt-4 font-semibold"
}
else{
status.innerHTML="❌ Still offline"
status.className="text-red-600 mt-4 font-semibold"
}
}
  </script>
</body>

</html>
